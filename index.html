<!DOCTYPE html>
<html>
<head>
  <title>Genuine Bazzar</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Genuine Bazzar</h2>
  <input type="text" placeholder="Search for products...">
  <a href="cart.html"><button>Cart 🛒</button></a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Big Sale 🔥</h1>
  <p>Up to 70% off</p>
</div>

<!-- PRODUCTS -->
<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>T-Shirt</h3>
    <p>₹799</p>
    <button onclick="addToCart('T-Shirt',799)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Hoodie</h3>
    <p>₹1499</p>
    <button onclick="addToCart('Hoodie',1499)">Add to Cart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
